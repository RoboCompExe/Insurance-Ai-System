
version: '3.9'

services:
  backend:
    build: ./backend-go
    ports:
      - "8080:8080"

  ai:
    build: ./ai-service
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
